# .github/workflows/ci.yml — OmniNet Quantum-Core Continuous Integration
#
# Triggered on every push to main and on all pull requests targeting main.
# Jobs: backend-tests · frontend-lint · docker-build · security-scan

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal permissions for the GITHUB_TOKEN (least-privilege)
permissions:
  contents: read

jobs:
  # ── 1. Backend tests (Python 3.11) ─────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check . --output-format=github || true

      - name: Run unit / smoke tests
        env:
          USE_SQLITE_FALLBACK: "true"
          DATABASE_URL: "sqlite:///./test_omninet.db"
          SECRET_KEY: "test-secret-key-for-ci-64-chars-minimum-padding!!"
          ENVIRONMENT: "test"
        run: pytest tests/ -v --tb=short

  # ── 2. Frontend lint & build (Node 20) ─────────────────────────────────────
  frontend-lint:
    name: Frontend Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ── 3. Docker build verification ────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env from example
        run: |
          cp .env.example .env
          # Inject CI-safe values so the build succeeds
          sed -i 's/CHANGE_THIS_ADMIN_PASSWORD/${{ secrets.CI_ADMIN_PASSWORD || '"'"'CIBuildPassword123!'"'"' }}/' .env
          sed -i 's/CHANGE_THIS_DB_PASSWORD/ci_db_password/' .env
          sed -i 's/CHANGE_THIS_REDIS_PASSWORD/ci_redis_password/' .env
          sed -i 's/CHANGE_THIS_TO_A_RANDOM_SECRET_KEY_64_CHARS_MINIMUM/ci_secret_key_64_chars_minimum_padding_here_!/' .env
          sed -i 's/CHANGE_THIS_TO_A_RANDOM_64_CHAR_LICENSE_SECRET_KEY/ci_license_secret_64_chars_minimum_padding_here!/' .env
          sed -i 's/CHANGE_THIS_GRAFANA_PASSWORD/ci_grafana_password/' .env

      - name: Build all Docker images
        run: docker compose build --parallel

  # ── 4. Security scan (Bandit) ───────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit security scan
        run: |
          bandit -r backend/ \
            --exclude backend/tests \
            -ll \
            --format json \
            --output bandit-report.json \
            || true
          bandit -r backend/ \
            --exclude backend/tests \
            -ll \
            --format txt

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30
