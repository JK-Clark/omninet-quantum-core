version: '3'
services:
  app:
    image: my-app-image
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-omninet}:${POSTGRES_PASSWORD:-changeme_in_production}@db:5432/${POSTGRES_DB:-omninet}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-CHANGE_THIS_TO_A_RANDOM_SECRET_KEY_64_CHARS}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ADMIN_DEFAULT_PASSWORD: Test123!
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: omninet
      POSTGRES_PASSWORD: changeme_in_production
      POSTGRES_DB: omninet
  redis:
    image: redis:latest
